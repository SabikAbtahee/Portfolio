<div
	class="flex min-h-[80vh] flex-col items-center justify-center px-4 text-center"
	data-testid="page-container"
>
	<div class="mb-8">
		<h1
			class="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-9xl font-extrabold text-transparent"
		>
			404
		</h1>
	</div>

	<div class="mb-6 text-8xl">🔍</div>

	<h2 class="mb-4 text-3xl font-bold text-gray-800">Page Not Found</h2>

	<p class="mb-8 max-w-md text-lg text-gray-600">
		Oops! The page you're looking for seems to have wandered off. Let's get you
		back on track.
	</p>

	<div class="flex flex-wrap justify-center gap-4">
		<a
			class="transform rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 px-6 py-3 font-semibold text-white shadow-lg transition-all duration-200 hover:-translate-y-0.5 hover:shadow-xl"
			routerLink="/"
		>
			Go Home
		</a>
		<button
			(click)="goBack()"
			class="rounded-lg bg-gray-200 px-6 py-3 font-semibold text-gray-700 transition-colors duration-200 hover:bg-gray-300"
			type="submit"
		>
			Go Back
		</button>
	</div>

	<div class="mt-12 text-sm text-gray-500">
		<p class="mb-2">Need help? Try these popular pages:</p>
		<div class="flex flex-wrap justify-center gap-4">
			<a class="underline hover:text-blue-600" routerLink="/">Home</a>
			<a class="underline hover:text-blue-600" routerLink="/about">About</a>
			<a class="underline hover:text-blue-600" routerLink="/sign-in">Sign In</a>
		</div>
	</div>
</div>
