<div class="not-found" data-testid="page-container">
	<div class="not-found-code-wrap">
		<h1 class="not-found-code">404</h1>
	</div>

	<div class="not-found-icon" aria-hidden="true">🔍</div>

	<h2 class="not-found-heading">Page Not Found</h2>

	<p class="not-found-message">
		Oops! The page you're looking for seems to have wandered off. Let's get you
		back on track.
	</p>

	<div class="not-found-actions">
		<a class="not-found-btn not-found-btn-primary" routerLink="/">
			Go Home
		</a>
		<button
			class="not-found-btn not-found-btn-secondary"
			type="button"
			(click)="goBack()"
		>
			Go Back
		</button>
	</div>
</div>
